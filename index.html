oved the fun and words.","questions":[{"question":"What is Herb's job on the farm?","model":"meta-llama/Llama-3.1-8B-Instruct","category":"unknown","kind":"single_hop","difficulty":5,"answer":"farmer"},{"question":"What did Fern write and give to Herb?","model":"meta-llama/Llama-3.1-8B-Instruct","category":"unknown","kind":"single_hop","difficulty":5,"answer":"a letter with a rhyme and a verse"},{"question":"Where did Herb and Fern work together to create more rhymes and fun?","model":"meta-llama/Llama-3.1-8B-Instruct","category":"unknown","kind":"single_hop","difficulty":5,"answer":"the farm"},{"question":"Why did Herb initially struggle to read Fern's letter?","model":"meta-llama/Llama-3.1-8B-Instruct","category":"unknown","kind":"single_hop","difficulty":5,"answer":"because he had to observe each word"},{"question":"How did Herb's reading aloud affect him?","model":"meta-llama/Llama-3.1-8B-Instruct","category":"unknown","kind":"single_hop","difficulty":5,"answer":"it made him feel super and confident"},{"question":"What happened to the farm after Herb became more confident in reading aloud?","model":"meta-llama/Llama-3.1-8B-Instruct","category":"unknown","kind":"single_hop","difficulty":5,"answer":"it became a happy place where people came to hear him read"},{"question":"What might have happened if Fern hadn't encouraged Herb to read her letter?","model":"meta-llama/Llama-3.1-8B-Instruct","category":"unknown","kind":"single_hop","difficulty":5,"answer":"Herb might not have become more confident in reading aloud"},{"question":"How might Herb's self-esteem have been affected if he hadn't received encouragement from Fern?","model":"meta-llama/Llama-3.1-8B-Instruct","category":"unknown","kind":"single_hop","difficulty":5,"answer":"he might have felt sad or discouraged"},{"question":"What might be some other ways that Herb and Fern could have made the farm a happier place?","model":"meta-llama/Llama-3.1-8B-Instruct","category":"unknown","kind":"single_hop","difficulty ?” Star said.\nStan bent to look.\nThere was no stamp on the steps.\nAt last, Stan went to the back desk.\nThe stamp was stuck to a stack of pads!\nStan held up the stamp.\n“Here it is!” he said.\nStar and Stan clap.\n“Next time, I will not lose my stamp,” Stan said.\nStar and Stan went back to class with a big grin.","questions":[{"question":"What did Stan lose?","model":"meta-llama/Llama-3.1-8B-Instruct","category":"unknown","kind":"single_hop","difficulty":5,"answer":"His red stamp."},{"question":"Where did Stan set the stamp initially?","model":"meta-llama/Llama-3.1-8B-Instruct","category":"unknown","kind":"single_hop","difficulty":5,"answer":"On the big stand in class."},{"question":"Where did Stan finally find the stamp?","model":"meta-llama/Llama-3.1-8B-Instruct","category":"unknown","kind":"single_hop","difficulty":5,"answer":"Stuck to a stack of pads at the back desk."},{"question":"How did Stan and Star find the stamp?","model":"meta-llama/Llama-3.1-8B-Instruct","category":"unknown","kind":"single_hop","difficulty":5,"answer":"They searched the classroom, thinking about where the stamp might be, and eventually found it stuck to a stack of pads."},{"question":"Why did Stan and Star go to the stand first?","model":"meta-llama/Llama-3.1-8B-Instruct","category":"unknown","kind":"single_hop","difficulty":5,"answer":"Because Stan remembered setting the stamp on the stand."},{"question":"Why did Stan and Star go to the steps next?","model":"meta-llama/Llama-3.1-8B-Instruct","category":"unknown","kind":"single_hop","difficulty":5,"answer":"Because Star suggested that the stamp might have fallen on the steps."},{"question":"What might have happened if Stan had been more careful with his belongings?","model":"meta-llama/Llama-3.1-8B-Instruct","category":"unknown","kind":"single_hop","difficulty":5,"answer":"He might not have lost the stamp."},{"question":"Why is it important to be careful with one's belongings?","model":"meta-llama/Llama-3.1-8B-Instruct","category": iculty":5,"answer":"There was no stamp on the steps."},{"question":"How did Stan find the stamp?","model":"Qwen/Qwen3-4B-Instruct-2507","category":"unknown","kind":"single_hop","difficulty":5,"answer":"He found it stuck to a stack of pads at the back desk."},{"question":"What did the stamp do when it was found?","model":"Qwen/Qwen3-4B-Instruct-2507","category":"unknown","kind":"single_hop","difficulty":5,"answer":"It was held up by Stan and shown to Star."},{"question":"Describe a time when you lost something and found it.","model":"Qwen/Qwen3-4B-Instruct-2507","category":"unknown","kind":"single_hop","difficulty":5,"answer":null}]},{"id":"story_d506c4709086","title":"Tom was a small boy with a big dream.","material":"Tom was a small boy with a big dream.  \nHe wanted to build a cool treehouse.  \nOn Tuesday, he got a blueprint for his plan.  \nThe blueprint was new and very blue.  \n\nHis mom came to see his plan.  \nShe looked at it and smiled.  \nTom and his mom began to gather items.  \nThey found wood, nails, and a hammer. \n \nTom's sister, Sue, also came to help.  \nShe brought some juice and fruit.  \nTom asked, \"Can I have a sip?\"  \nSue gave him juice and a big red apple. \n \nThe wind blew strong all day.  \nBut they did not stop.  \nTom and Sue took turns with the hammer.  \nTheir arms got tired, but they kept on. \n \nAt last, they had built the base.  \nThey were glad and took a break.  \nTom drew a big sun on the blueprint.  \nHe said, \"This will be the top of the treehouse.\"  \n\nOn the next day, the work began again.  \nTom felt like it was a long cruise, not work.  \nHe ate some fruit while thinking.  \nSue said, \"I will chew some gum.\"  \n\nTom laughed and nodded.  \nAfter much effort, the treehouse was done.  \nIt was a fine new place for fun.  \nTom and Sue celebrated with more juice.","questions":[{"question":"What did Tom want to build?","model":"Qwen/Qwen3-4B-Instruct-2507","category":"unknown","kind":"single_hop","difficulty":5,"answer           ]},

            { score: 2, label: "Ideal",    text: "Includes ideas and details meaningfully relevant to the topic with no irrelevant details" },
            { score: 1, label: "Moderate", text: "Includes ideas and details mostly relevant to the topic but may include 1-2 irrelevant details" },
            { score: 0, label: "Poor",     text: "Includes 2 or more irrelevant ideas or details not meaningfully relevant to the topic" },

    // ─── RUBRIC ──────────────────────────────────────────────────────────────────

    const CRITERIA = [
      {
        id: "sentenceLength",
        name: "Sentence Length & Complexity",
        icon: "📏",
        levels: [
          { score: 2, detail: "Short sentences (<10 words) AND no complex phrases" },
          { score: 1, detail: "Short sentences (<10 words) OR no complex phrases — one, not both" },
          { score: 0, detail: "Long sentences (>10 words) AND complex phrases" },

      {
        id: "vocabulary",
        name: "Vocabulary",
        icon: "📖",

          { score: 2, detail: 'Child-friendly words (e.g. "found" not "discovered") AND no meta-language (e.g. "plot")' },
          { score: 1, detail: "Child-friendly words OR no meta-language — one, not both" },
          { score: 0, detail: "Non child-friendly words AND complex/meta-language" },

      {

    // ─── DATA UTILITIES ───────────────────────────────────────────────────────────

    function extractMetadata(row) {
      return {
        question_category: row.question_category || null,
        estimated_difficulty: row.estimated_difficulty !== undefined && row.estimated_difficulty !== null ? row.estimated_difficulty : null,
        kind:         row.kind || null,
        model:        row.question_generating_model || null,
        ground_truth: row.ground_truth_answer || null,
        document_id:  row.document_id || null,
      };
    }

    function buildStories(data) {
      return data.map(function(story) {
        var qs    = story.questions;
        var half  = Math.floor(qs.length / 2);
        var grpA  = qs.slice(0, half);
        var grpB  = qs.slice(half, half * 2);
        var pairs = [];
        for (var j = 0; j < grpA.length; j++) {
          pairs.push({
            id:        story.id + "_pair_" + j,
            questionA: grpA[j].question || "",
            questionB: grpB[j].question || "",
            metadataA: { model: grpA[j].model, category: grpA[j].category, kind: grpA[j].kind, difficulty: grpA[j].difficulty },
            metadataB: { model: grpB[j].model, category: grpB[j].category, kind: grpB[j].kind, difficulty: grpB[j].difficulty },
          });
        }
        return { id: story.id, title: story.title, material: story.material, pairs: pairs };
      }).filter(function(s) { return s.pairs.length > 0; });
    }

    // ─── CORE UTILITIES ───────────────────────────────────────────────────────────

    function emptyScores() { return { sentenceLength: null, vocabulary: null, keyIdeas: null }; }

    function totalScore(scores) {
      var vals = Object.values(scores);
      if (vals.some(function(v) { return v === null; })) return null;
      return vals.reduce(function(a, b) { return a + b; }, 0);
    }

    function allFilled(scores) {
      return Object.values(scores).every(function(v) { return v !== null; });
    }

    function downloadJSON(data, filename) {
      var blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
      var url  = URL.createObjectURL(blob);
      var a    = document.createElement("a");
      a.href = url; a.download = filename;
      document.body.appendChild(a); a.click();
      document.body.removeChild(a); URL.revokeObjectURL(url);
    }

    // ─── SCORE SELECTOR ──────────────────────────────────────────────────────────

    function ScoreSelector({ value, onChange }) {
      var active = {
        0: "bg-red-500 text-white border-red-500 shadow-sm",
        1: "bg-amber-400 text-white border-amber-400 shadow-sm",
        2: "bg-green-500 text-white border-green-500 shadow-sm",
      };
      var idle = {
        0: "bg-white border-gray-200 text-gray-400 hover:border-red-300 hover:text-red-500",
        1: "bg-white border-gray-200 text-gray-400 hover:border-amber-300 hover:text-amber-500",
        2: "bg-white border-gray-200 text-gray-400 hover:border-green-300 hover:text-green-500",
      };
      return (
        <div className="flex gap-1.5 shrink-0">
          {[0, 1, 2].map(function(s) {
            return (
              <button
                key={s}
                onClick={function() { onChange(value === s ? null : s); }}
                className={"w-9 h-9 rounded-lg border-2 font-bold text-sm transition-all select-none " +
                  (value === s ? active[s] : idle[s])}
                title={"Score " + s}
              >{s}</button>
            );
          })}</div>
      );
    }

    // ─── STORY RUBRIC COMPONENTS ─────────────────────────────────────────────────

    function StoryCriterionRow({ criterion, value, onChange }) {
      var scoreColor = {
        2: { ring: "border-green-500 bg-green-50",  badge: "bg-green-500 text-white",  label: "text-green-700", text: "text-green-800" },
        1: { ring: "border-amber-400 bg-amber-50",  badge: "bg-amber-400 text-white",  label: "text-amber-700", text: "text-amber-800" },
        0: { ring: "border-red-500 bg-red-50",      badge: "bg-red-500 text-white",    label: "text-red-700",   text: "text-red-800"   },
      };
      var scoreColorOff = {
        2: { ring: "border-gray-200 bg-white hover:border-green-300 hover:bg-green-50/40", badge: "bg-gray-100 text-gray-400", label: "text-gray-500", text: "text-gray-400" },
        1: { ring: "border-gray-200 bg-white hover:border-amber-300 hover:bg-amber-50/40", badge: "bg-gray-100 text-gray-400", label: "text-gray-500", text: "text-gray-400" },
        0: { ring: "border-gray-200 bg-white hover:border-red-300 hover:bg-red-50/40",     badge: "bg-gray-100 text-gray-400", label: "text-gray-500", text: "text-gray-400" },
      };
      return (
        <div className="py-3 border-b border-gray-100 last:border-b-0">
          <div className="flex items-center gap-1.5 mb-2">
            {value !== null && value !== undefined && (
              <span className={value === 2 ? "text-green-500 text-xs" : value === 1 ? "text-amber-500 text-xs" : value === -1 ? "text-gray-400 text-xs" : "text-red-500 text-xs"}>&#9679;</span>
            )}
            <span className="text-xs font-semibold text-gray-700 leading-tight">{criterion.label}</span>
          </div>
          <div className="space-y-1.5">
            {criterion.desc.map(function(level) {
              var isOn = value === level.score;
              var c    = isOn ? scoreColor[level.score] : scoreColorOff[level.score];
              return (
                <button key={level.score}
                  onClick={function() { onChange(value === level.score ? null : level.score); }}
                  className={"w-full text-left flex items-start gap-2.5 px-2.5 py-2 rounded-lg border-2 transition-all " + c.ring}
                >
                  <span className={"shrink-0 mt-0.5 min-w-[3.5rem] text-center text-xs font-bold px-1.5 py-0.5 rounded-md " + c.badge}>
                    {level.score} — {level.label}
                  </span>
                  <span className={"text-xs leading-snug " + c.text}>{level.text}</span>
                </button>
              );
            })}</div>
          {criterion.hasNA && (
            <button onClick={function() { onChange(value === -1 ? null : -1); }}
              className={"mt-2 px-2.5 py-1.5 rounded-lg border-2 text-xs font-semibold transition-all w-full text-left " + (value === -1 ? "bg-gray-500 text-white border-gray-500" : "bg-white border-gray-200 text-gray-400 hover:border-gray-400 hover:text-gray-600")}
            >N/A — no illustrations present</button>
          )}
        </div>
      );
    }

    function StorySectionScorer({ section, scores, onScore }) {
      const [collapsed, setCollapsed] = useState(!!section.optional);
      var colorMap = { blue: "bg-blue-600", green: "bg-green-600", teal: "bg-teal-600", purple: "bg-purple-600", pink: "bg-pink-600" };
      var hdrCls = colorMap[section.color] || "bg-blue-600";
      var scoredCount = section.criteria.filter(function(c) { return scores[c.id] !== null && scores[c.id] !== undefined; }).length;
      var allDone = scoredCount === section.criteria.length;
      return (
        <div className="border rounded-xl overflow-hidden shadow-sm">
          <button onClick={function() { setCollapsed(function(c) { return !c; }); }}
            className={"w-full flex items-center justify-between px-3 py-2.5 text-left " + hdrCls}
          >
            <div className="flex items-center gap-2">
              <span className="text-white font-bold text-xs">{section.section}</span>
              {section.optional && <span className="text-xs bg-white/25 text-white px-1.5 py-0.5 rounded-full">optional</span>}
            </div>
            <div className="flex items-center gap-2">
              <span className={"text-xs px-1.5 py-0.5 rounded-full font-medium " + (allDone ? "bg-white/30 text-white" : "bg-white/15 text-white/80")}>{scoredCount}/{section.criteria.length}</span>
              <span className="text-white/90 text-xs">{collapsed ? "▸" : "▾"}</span>
            </div>
          </button>
          {!collapsed && (
            <div className="px-3 pb-2 pt-1 bg-white">
              {section.criteria.map(function(c) {
                return (
                  <StoryCriterionRow key={c.id} criterion={c}
                    value={scores[c.id] !== undefined ? scores[c.id] : null}
                    onChange={function(v) { onScore(c.id, v); }}
                  />
                );
              })}</div>
          )}</div>
      );
    }

    function StoryRubricForm({ pair, existing, onSubmit, onSkip }) {
      const [docType, setDocType] = useState(existing ? existing.docType : null);
      const [scores, setScores]   = useState(existing ? Object.assign({}, existing.scores) : {});
      const [notes, setNotes]     = useState(existing ? existing.notes || "" : "");

      function setScore(id, v) { setScores(function(prev) { var u = Object.assign({}, prev); u[id] = v; return u; }); }

      function getRequiredIds() {
        var ids = [];
        STORY_RUBRIC.forEach(function(sec) {
          if (sec.optional) return;
          if (sec.docType && sec.docType !== docType) return;
          sec.criteria.forEach(function(c) { ids.push(c.id); });
        });
        return ids;
      }

      var requiredIds = docType ? getRequiredIds() : [];
      var canSubmit   = docType !== null && requiredIds.every(function(id) { return scores[id] !== undefined && scores[id] !== null; });

      return (
        <div className="bg-white border rounded-xl shadow-sm overflow-hidden">
          <div className="bg-blue-600 px-4 py-3 flex items-center justify-between">
            <div>
              <div className="text-white font-bold text-sm">① Story Quality Scoring</div>
              <div className="text-blue-200 text-xs mt-0.5">Evaluate the story before annotating questions</div>
            </div>
            <button onClick={onSkip} className="shrink-0 text-blue-200 hover:text-white text-xs border border-blue-400 hover:border-white px-2.5 py-1 rounded-lg transition-colors">
              Skip → Questions
            </button>
          </div>
          <div className="p-4 space-y-4">
            <div>
              <div className="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Text type <span className="text-red-400">*</span></div>
              <div className="grid grid-cols-2 gap-2">
                {[{ id: "narrative", label: "Narrative", desc: "Story with characters & plot" },
                  { id: "informational", label: "Informational", desc: "Non-fiction / expository" }
                ].map(function(opt) {
                  var isOn = docType === opt.id;
                  return (
                    <button key={opt.id} onClick={function() { setDocType(opt.id); }}
                      className={"p-3 rounded-xl border-2 text-left transition-all " + (isOn ? "border-blue-500 bg-blue-50" : "border-gray-200 hover:border-blue-300 bg-white")}
                    >
                      <div className={"text-sm font-bold " + (isOn ? "text-blue-700" : "text-gray-600")}>{opt.label}</div>
                      <div className="text-xs text-gray-400 mt-0.5">{opt.desc}</div>
                    </button>
                  );
                })}</div>
            </div>
            {STORY_RUBRIC.map(function(sec) {
              if (sec.docType && sec.docType !== docType) return null;
              return <StorySectionScorer key={sec.id} section={sec} scores={scores} onScore={setScore} />;
            })}

            <div>
              <div className="text-xs font-semibold text-gray-500 mb-1.5">Notes <span className="font-normal text-gray-400">(optional)</span></div>
              <textarea value={notes} onChange={function(e) { setNotes(e.target.value); }}
                placeholder="Any additional observations about this story..."
                className="w-full border border-gray-200 rounded-lg p-2.5 text-xs h-16 resize-none focus:outline-none focus:ring-2 focus:ring-blue-200"
              />
            </div>
            <button
              onClick={function() { onSubmit({ pairId: pair.id, docType: docType, scores: scores, notes: notes }); }}
              disabled={!canSubmit}
              className={"w-full py-3 rounded-xl font-bold text-sm transition-all " + (canSubmit ? "bg-blue-600 text-white hover:bg-blue-700 shadow-sm" : "bg-gray-100 text-gray-400 cursor-not-allowed")}
            >
              {canSubmit ? "Save Story Scores → Continue to Questions" : docType ? "Score all required criteria to continue" : "Select a text type to begin"}
            </button>
          </div>
        </div>
      );
    }

    // ─── QUESTION SCORE CARD ─────────────────────────────────────────────────
    function QuestionScoreCard({ label, question, scores, onScoreChange, accent, skipped, onSkipToggle }) {
      var accentMap = {
        blue:   { header: "bg-blue-600",   badge: "bg-blue-100 text-blue-800",   btn: "bg-blue-600 hover:bg-blue-700 text-white", btnSel: "ring-2 ring-blue-600 ring-offset-1" },
        violet: { header: "bg-violet-600", badge: "bg-violet-100 text-violet-800", btn: "bg-violet-600 hover:bg-violet-700 text-white", btnSel: "ring-2 ring-violet-600 ring-offset-1" },
      };
      var ac = accentMap[accent] || accentMap.blue;

      return (
        <div className={"border rounded-xl overflow-hidden shadow-sm " + (skipped ? "opacity-60" : "")}>
          <div className={"px-4 py-3 flex items-center justify-between " + ac.header}>
            <span className="text-white font-bold text-sm">{label}</span>
            <button
              onClick={onSkipToggle}
              className={"shrink-0 text-xs px-2.5 py-1 rounded-lg border transition-colors " + (skipped ? "bg-white text-red-600 border-white font-semibold" : "text-white/80 hover:text-white border-white/40 hover:border-white")}
            >
              {skipped ? "⛔ Skipped — undo" : "⛔ Skip question"}
            </button>
          </div>
          {skipped ? (
            <div className="px-4 py-6 bg-gray-50 text-center">
              <div className="text-sm text-gray-400 line-through mb-1">{question}</div>
              <div className="text-xs text-gray-400 mt-2">⛔ Question skipped — not scored</div>
            </div>
          ) : (
            <div className="p-4 space-y-4">
              <p className="text-sm text-gray-800 font-medium leading-snug">{question}</p>
              {CRITERIA.map(function(criterion) {
                var current = scores[criterion.id];
                return (
                  <div key={criterion.id} className="space-y-1.5">
                    <div className="flex items-center gap-1.5">
                      <span className="text-sm">{criterion.icon}</span>
                      <span className="text-xs font-semibold text-gray-700">{criterion.name}</span>
                    </div>
                    <div className="grid grid-cols-3 gap-1.5">
                      {criterion.levels.map(function(level) {
                        var isSel = current === level.score;
                        return (
                          <button key={level.score}
                            onClick={function() { onScoreChange(criterion.id, level.score); }}
                            className={"p-2 rounded-lg border text-xs text-left transition-all " + (isSel ? "border-transparent bg-gray-800 text-white shadow-md " + ac.btnSel : "border-gray-200 bg-white text-gray-600 hover:border-gray-300 hover:bg-gray-50")}
                          >
                            <div className="font-bold mb-0.5">{level.score === 2 ? "Good (2)" : level.score === 1 ? "OK (1)" : "Poor (0)"}</div>
                            <div className={"leading-tight " + (isSel ? "text-white/80" : "text-gray-400")}>{level.detail}</div>
                          </button>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    }

    // ─── RUBRIC PANEL ────────────────────────────────────────────────────────
    function RubricPanel({ onClose }) {
      return (
        <div className="fixed inset-0 bg-black/50 z-50 flex items-end sm:items-center justify-center p-4">
          <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-[80vh] flex flex-col">

                      <span className="font-semibold text-gray-800 text-sm">{c.name}</span>
                    </div>
                    {c.levels.map(function(l) {

    // ─── FLAG MODAL ──────────────────────────────────────────────────────────
    function FlagModal({ pair, onClose, onSave, existing }) {
      const [reason, setReason] = useState(existing ? existing.reason || "" : "");
      const [notes, setNotes] = useState(existing ? existing.notes || "" : "");
      var reasons = ["Both questions identical","Question is not text-based","Story text not visible","Technical issue","Other"];
      return (
        <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
          <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md">
            <div className="px-5 py-4 border-b flex items-center justify-between">
              <h2 className="font-bold text-gray-800">Flag this pair</h2>
              <button onClick={onClose} className="text-gray-400 hover:text-gray-700 text-lg font-bold">×</button>
            </div>
            <div className="p-5 space-y-4">
              <div>
                <div className="text-xs font-semibold text-gray-500 mb-2">Reason</div>
                <div className="space-y-1.5">
                  {reasons.map(function(r) {
                    return (
                      <label key={r} className="flex items-center gap-2 cursor-pointer">
                        <input type="radio" name="flagReason" value={r} checked={reason === r}
                          onChange={function() { setReason(r); }}
                          className="text-red-500 focus:ring-red-400"
                        />
                        <span className="text-sm text-gray-700">{r}</span>
                      </label>
                    );
                  })}
                </div>
              </div>
              <div>
                <div className="text-xs font-semibold text-gray-500 mb-1.5">Notes (optional)</div>
                <textarea value={notes} onChange={function(e) { setNotes(e.target.value); }}
                  placeholder="Additional details..."
                  className="w-full border border-gray-200 rounded-lg p-2.5 text-xs h-20 resize-none focus:outline-none focus:ring-2 focus:ring-red-200"
                />
              </div>
              <div className="flex gap-2">
                <button onClick={onClose} className="flex-1 py-2.5 rounded-xl border border-gray-200 text-sm text-gray-600 hover:bg-gray-50">Cancel</button>
                <button
                  onClick={function() { if (reason) { onSave({ reason: reason, notes: notes }); onClose(); } }}
                  disabled={!reason}
                  className={"flex-1 py-2.5 rounded-xl text-sm font-semibold transition-all " + (reason ? "bg-red-500 text-white hover:bg-red-600" : "bg-gray-100 text-gray-400 cursor-not-allowed")}
                >Save flag</button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ─── PAIR FORM ───────────────────────────────────────────────────────────
    function PairForm({ pair, onSubmit, existing, isAnnotated }) {
      var initScores = function(q) {
        if (!q) return {};
        var s = {};
        CRITERIA.forEach(function(c) { s[c.id] = null; });
        return s;
      };

      var initFromExisting = function(side) {
        if (!existing) return null;
        return existing[side] || null;
      };

      const [scoresA, setScoresA] = useState(function() { return existing && existing.scoresA ? Object.assign({}, existing.scoresA) : initScores(pair.questionA); });
      const [scoresB, setScoresB] = useState(function() { return existing && existing.scoresB ? Object.assign({}, existing.scoresB) : initScores(pair.questionB); });
      const [winner, setWinner]   = useState(existing ? existing.winner || null : null);
      const [flagged, setFlagged] = useState(existing ? existing.flagged || null : null);
      const [notes, setNotes]     = useState(existing ? existing.notes || "" : "");
      const [skipA, setSkipA]     = useState(existing ? existing.skipA || false : false);
      const [skipB, setSkipB]     = useState(existing ? existing.skipB || false : false);
      const [showFlag, setShowFlag] = useState(false);
      const [showRubric, setShowRubric] = useState(false);

      var effectiveWinner = winner;
      if (skipA && !skipB) effectiveWinner = "B";
      if (skipB && !skipA) effectiveWinner = "A";
      if (skipA && skipB)  effectiveWinner = "tie";

      var scoredA = !skipA && CRITERIA.every(function(c) { return scoresA[c.id] !== null && scoresA[c.id] !== undefined; });
      var scoredB = !skipB && CRITERIA.every(function(c) { return scoresB[c.id] !== null && scoresB[c.id] !== undefined; });
      var canSubmit = (skipA || scoredA) && (skipB || scoredB) && effectiveWinner !== null;

      function handleSubmit() {
        if (!canSubmit) return;
        onSubmit({
          pairId: pair.id,
          scoresA: skipA ? null : scoresA,
          scoresB: skipB ? null : scoresB,
          winner: effectiveWinner,
          skipA: skipA,
          skipB: skipB,
          flagged: flagged,
          notes: notes,
          timestamp: new Date().toISOString(),
        });
      }

      return (
        <div className="space-y-4">
          {showRubric && <RubricPanel onClose={function() { setShowRubric(false); }} />}
          {showFlag && (
            <FlagModal pair={pair} existing={flagged} onClose={function() { setShowFlag(false); }}
              onSave={function(f) { setFlagged(f); }} />
          )}

          {isAnnotated && (
            <div className="flex items-center gap-2 px-3 py-2 bg-green-50 border border-green-200 rounded-xl text-xs text-green-700">
              <span className="font-semibold">✓ Already annotated</span>
              <span className="text-green-500">Re-submitting will overwrite.</span>
            </div>
          )}

          <div className="grid grid-cols-2 gap-3">
            <QuestionScoreCard label="Question A" question={pair.questionA}
              scores={scoresA} onScoreChange={function(id, v) { setScoresA(function(p) { var u = Object.assign({}, p); u[id] = v; return u; }); }}
              accent="blue" skipped={skipA} onSkipToggle={function() { setSkipA(function(v) { return !v; }); }}
            />
            <QuestionScoreCard label="Question B" question={pair.questionB}
              scores={scoresB} onScoreChange={function(id, v) { setScoresB(function(p) { var u = Object.assign({}, p); u[id] = v; return u; }); }}
              accent="violet" skipped={skipB} onSkipToggle={function() { setSkipB(function(v) { return !v; }); }}
            />
          </div>

          {(skipA || skipB) && !(skipA && skipB) && (
            <div className="px-3 py-2 bg-amber-50 border border-amber-200 rounded-xl text-xs text-amber-700">
              One question skipped — winner auto-set to the unskipped question.
            </div>
          )}

          {!(skipA || skipB) && (
            <div>
              <div className="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Overall winner</div>
              <div className="grid grid-cols-3 gap-2">
                {[{v:"A",label:"Question A is better"},{v:"tie",label:"About equal"},{v:"B",label:"Question B is better"}].map(function(opt) {
                  var isSel = effectiveWinner === opt.v;
                  return (
                    <button key={opt.v} onClick={function() { setWinner(opt.v); }}
                      className={"py-2.5 px-3 rounded-xl border-2 text-xs font-semibold transition-all " + (isSel ? "border-gray-800 bg-gray-800 text-white shadow-md" : "border-gray-200 text-gray-600 hover:border-gray-400 hover:bg-gray-50")}
                    >{opt.label}</button>
                  );
                })}
              </div>
            </div>
          )}

          <div>
            <div className="text-xs font-semibold text-gray-500 mb-1.5">Notes (optional)</div>
            <textarea value={notes} onChange={function(e) { setNotes(e.target.value); }}
              placeholder="Any observations about this pair..."
              className="w-full border border-gray-200 rounded-lg p-2.5 text-xs h-16 resize-none focus:outline-none focus:ring-2 focus:ring-gray-200"
            />
          </div>

          <div className="flex gap-2">
            <button onClick={function() { setShowFlag(true); }}
              className={"py-2.5 px-4 rounded-xl border text-xs font-semibold transition-all " + (flagged ? "border-red-300 bg-red-50 text-red-600" : "border-gray-200 text-gray-500 hover:border-gray-300 hover:bg-gray-50")}
            >{flagged ? "⚑ Flagged: " + flagged.reason : "⚑ Flag pair"}</button>
            <button onClick={function() { setShowRubric(true); }}
              className="py-2.5 px-4 rounded-xl border border-gray-200 text-xs text-gray-500 hover:bg-gray-50"
            >Rubric</button>
            <button onClick={handleSubmit} disabled={!canSubmit}
              className={"flex-1 py-2.5 rounded-xl font-bold text-sm transition-all " + (canSubmit ? "bg-gray-900 text-white hover:bg-gray-700 shadow-sm" : "bg-gray-100 text-gray-400 cursor-not-allowed")}
            >{isAnnotated ? "Update annotation" : "Submit annotation"}</button>
          </div>
        </div>
      );
    }

    // ─── DONE SCREEN ─────────────────────────────────────────────────────────
    function DoneScreen({ stories, annotations, storyAnnotations, skippedStories, onDownload, onRestart }) {
      var totalStories   = stories.length;
      var totalPairs     = stories.reduce(function(s, st) { return s + st.pairs.length; }, 0);
      var scoredStories  = Object.keys(storyAnnotations).length;
      var skippedCount   = Object.keys(skippedStories).length;
      var annotatedPairs = Object.keys(annotations).length;

      return (
        <div className="min-h-screen bg-gray-50 flex items-center justify-center p-8">
          <div className="bg-white rounded-2xl shadow-xl max-w-lg w-full p-8 text-center space-y-6">
            <div className="text-5xl">&#x2705;</div>
            <div>
              <h1 className="text-2xl font-bold text-gray-900 mb-1">Batch complete!</h1>
              <p className="text-gray-500 text-sm">{totalStories} unique stories reviewed</p>
            </div>
            <div className="grid grid-cols-2 gap-3 text-left">
              <div className="bg-green-50 rounded-xl p-4">
                <div className="text-2xl font-bold text-green-700">{annotatedPairs}</div>
                <div className="text-xs text-gray-500 mt-0.5">Question pairs annotated</div>
              </div>
              <div className="bg-blue-50 rounded-xl p-4">
                <div className="text-2xl font-bold text-blue-700">{scoredStories}</div>
                <div className="text-xs text-gray-500 mt-0.5">Stories scored</div>
              </div>
              <div className="bg-orange-50 rounded-xl p-4">
                <div className="text-2xl font-bold text-orange-600">{skippedCount}</div>
                <div className="text-xs text-gray-500 mt-0.5">Stories skipped</div>
              </div>
              <div className="bg-gray-50 rounded-xl p-4">
                <div className="text-2xl font-bold text-gray-900">{totalPairs}</div>
                <div className="text-xs text-gray-500 mt-0.5">Total question pairs</div>
              </div>
            </div>
            <div className="space-y-2">
              <button onClick={onDownload}
                className="w-full py-3 rounded-xl bg-gray-900 text-white font-bold text-sm hover:bg-gray-700 transition-all shadow-sm"
              >&#x2913; Download annotations JSON</button>
              <button onClick={onRestart}
                className="w-full py-3 rounded-xl border border-gray-200 text-gray-600 text-sm hover:bg-gray-50 transition-all"
              >Start over</button>
            </div>
          </div>
        </div>
      );
    }

    // ─── MAIN APP ────────────────────────────────────────────────────────────
    function App() {
      const [stories, setStories]               = useState(function() { return buildStories(STORIES_DATA); });
      const [currentStoryIdx, setCurrentStoryIdx] = useState(0);
      const [currentPairIdx, setCurrentPairIdx]   = useState(0);
      const [annotations, setAnnotations]         = useState({});
      const [storyAnnotations, setStoryAnnotations] = useState({});
      const [skippedStories, setSkippedStories]   = useState({});
      const [currentStep, setCurrentStep]         = useState("story");
      const [skipStoryPanel, setSkipStoryPanel]   = useState(false);
      const [skipStoryReason, setSkipStoryReason] = useState("");
      const [done, setDone]                       = useState(false);

      var currentStory    = stories[currentStoryIdx] || null;
      var currentPair     = currentStory ? currentStory.pairs[currentPairIdx] : null;
      var isAnnotated     = currentPair ? !!annotations[currentPair.id] : false;
      var isStoryScored   = currentStory ? !!storyAnnotations[currentStory.id] : false;
      var isStorySkipped  = currentStory ? !!skippedStories[currentStory.id] : false;

      function buildExportData(storyAnns, pairAnns, skipped) {
        return stories.map(function(story) {
          return {
            storyId:         story.id,
            storyTitle:      story.title,
            storyAnnotation: storyAnns[story.id] || null,
            storySkipped:    !!skipped[story.id],
            pairs: story.pairs.map(function(p) {
              return { pairId: p.id, questionA: p.questionA, questionB: p.questionB, annotation: pairAnns[p.id] || null };
            }),
          };
        });
      }

      function downloadExport(storyAnns, pairAnns, skipped) {
        var data = buildExportData(storyAnns, pairAnns, skipped);
        var blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
        var url  = URL.createObjectURL(blob);
        var a    = document.createElement("a");
        a.href = url;
        a.download = "annotations_" + new Date().toISOString().slice(0,10) + ".json";
        a.click();
        URL.revokeObjectURL(url);
      }

      function navigateToStory(idx) {
        setCurrentStoryIdx(idx);
        setCurrentPairIdx(0);
        var s = stories[idx];
        setCurrentStep(s && (storyAnnotations[s.id] || skippedStories[s.id]) ? "questions" : "story");
        setSkipStoryPanel(false);
        setSkipStoryReason("");
      }

      function handleStorySubmit(storyAnn) {
        var updated = Object.assign({}, storyAnnotations);
        updated[storyAnn.pairId] = Object.assign({}, storyAnn, { timestamp: new Date().toISOString() });
        setStoryAnnotations(updated);
        setCurrentStep("questions");
        setCurrentPairIdx(0);
      }

      function handleSkipStory() {
        if (!currentStory) return;
        var updated = Object.assign({}, skippedStories);
        updated[currentStory.id] = { reason: skipStoryReason, timestamp: new Date().toISOString() };
        setSkippedStories(updated);
        setSkipStoryPanel(false);
        setSkipStoryReason("");
        setCurrentStep("questions");
        setCurrentPairIdx(0);
      }

      function handleAnnotationSubmit(ann) {
        var updated = Object.assign({}, annotations);
        updated[ann.pairId] = ann;
        setAnnotations(updated);
        if (currentPairIdx < currentStory.pairs.length - 1) {
          setCurrentPairIdx(currentPairIdx + 1);
        } else if (currentStoryIdx < stories.length - 1) {
          navigateToStory(currentStoryIdx + 1);
        } else {
          setDone(true);
        }
      }

      function findResumeIdx(storyAnns, pairAnns, skipped) {
        for (var i = 0; i < stories.length; i++) {
          var s = stories[i];
          if (skipped[s.id]) continue;
          if (s.pairs.every(function(p) { return !!pairAnns[p.id]; })) continue;
          return i;
        }
        return stories.length - 1;
      }

      function handleImport(data) {
        // Reconstruct state maps from the exported array format
        var restoredStory   = {};
        var restoredPairs   = {};
        var restoredSkipped = {};
        data.forEach(function(entry) {
          if (entry.storyAnnotation) restoredStory[entry.storyId] = entry.storyAnnotation;
          if (entry.storySkipped)    restoredSkipped[entry.storyId] = { imported: true };
          (entry.pairs || []).forEach(function(p) {
            if (p.annotation) restoredPairs[p.pairId] = p.annotation;
          });
        });
        setStoryAnnotations(restoredStory);
        setAnnotations(restoredPairs);
        setSkippedStories(restoredSkipped);
        var resumeIdx = findResumeIdx(restoredStory, restoredPairs, restoredSkipped);
        setCurrentStoryIdx(resumeIdx);
        setCurrentPairIdx(0);
        var rs = stories[resumeIdx];
        setCurrentStep(rs && (restoredStory[rs.id] || restoredSkipped[rs.id]) ? "questions" : "story");
      }

      if (done) {
        return (
          <DoneScreen
            stories={stories}
            annotations={annotations}
            storyAnnotations={storyAnnotations}
            skippedStories={skippedStories}
            onDownload={function() { downloadExport(storyAnnotations, annotations, skippedStories); }}
            onRestart={function() {
              setAnnotations({});
              setStoryAnnotations({});
              setSkippedStories({});
              setCurrentStoryIdx(0);
              setCurrentPairIdx(0);
              setCurrentStep("story");
              setDone(false);
            }}
          />
        );
      }

      return (
        <div className="min-h-screen bg-gray-100">

          {/* ── Header ── */}
          <header className="bg-white border-b sticky top-0 z-30 shadow-sm">
            <div className="max-w-screen-xl mx-auto px-4 py-2.5 flex items-center gap-3">
              <span className="font-bold text-gray-800 text-sm shrink-0">Question Annotator</span>
              <span className={"shrink-0 text-xs font-semibold px-2 py-1 rounded-full " + (currentStep === "story" ? "bg-blue-100 text-blue-700" : "bg-violet-100 text-violet-700")}>
                {currentStep === "story" ? "① Story" : "② Questions"}
              </span>
              {/* Story progress dots */}
              <div className="flex-1 flex flex-wrap gap-1 items-center overflow-hidden">
                {stories.map(function(story, idx) {
                  var isSkippedDot       = !!skippedStories[story.id];
                  var hasStory           = !!storyAnnotations[story.id];
                  var allPairsAnnotated  = story.pairs.length > 0 && story.pairs.every(function(p) { return !!annotations[p.id]; });
                  var somePairsAnnotated = story.pairs.some(function(p) { return !!annotations[p.id]; });
                  var cls = idx === currentStoryIdx
                    ? "w-6 h-3 bg-violet-600"
                    : isSkippedDot
                    ? "w-3 h-3 bg-orange-400 hover:bg-orange-500"
                    : allPairsAnnotated
                    ? "w-3 h-3 bg-green-400 hover:bg-green-500"
                    : somePairsAnnotated || hasStory
                    ? "w-3 h-3 bg-blue-400 hover:bg-blue-500"
                    : "w-3 h-3 bg-gray-300 hover:bg-gray-400";
                  return (
                    <button key={story.id} onClick={function() { navigateToStory(idx); }}
                      className={"rounded-full transition-all cursor-pointer " + cls}
                      title={"Story " + (idx+1) + (allPairsAnnotated ? " ✓" : somePairsAnnotated ? " partial" : isSkippedDot ? " skipped" : "")}
                    />
                  );
                })}
              </div>
              <span className="shrink-0 text-xs text-gray-400">{currentStoryIdx + 1}/{stories.length}</span>
              {/* Import button */}
              <label className="shrink-0 text-xs border border-gray-200 text-gray-500 hover:text-gray-800 hover:border-gray-400 px-2.5 py-1 rounded-lg transition-colors cursor-pointer" title="Resume from a saved JSON file">
                &#x1F4C2; Import
                <input type="file" accept=".json" className="hidden" onChange={function(e) {
                  var file = e.target.files[0];
                  if (!file) return;
                  var reader = new FileReader();
                  reader.onload = function(ev) {
                    try {
                      var data = JSON.parse(ev.target.result);
                      if (Array.isArray(data)) handleImport(data);
                    } catch(err) { alert("Could not read file: " + err.message); }
                  };
                  reader.readAsText(file);
                  e.target.value = "";
                }} />
              </label>
              {/* Export button */}
              <button
                onClick={function() { downloadExport(storyAnnotations, annotations, skippedStories); }}
                className="shrink-0 text-xs border border-gray-200 text-gray-500 hover:text-gray-800 hover:border-gray-400 px-2.5 py-1 rounded-lg transition-colors"
                title="Save current progress as JSON"
              >&#x2913; Export</button>
            </div>
          </header>

          <div className="max-w-screen-xl mx-auto px-4 py-4">
            <div className="grid grid-cols-[minmax(0,1fr)_minmax(0,2fr)] gap-4 items-start">

              {/* ── Left column: story text ── */}
              <div className="space-y-3">
                {currentStory && (
                  <div className="bg-white rounded-xl border shadow-sm overflow-hidden">
                    <div className="px-4 py-3 border-b bg-gray-50 flex items-center justify-between">
                      <div className="text-xs font-semibold text-gray-600 uppercase tracking-wider">Story</div>
                      <span className="text-xs text-gray-400">#{currentStoryIdx + 1} of {stories.length}</span>
                    </div>
                    <div className="p-4 max-h-[60vh] overflow-y-auto">
                      <p className="text-sm text-gray-700 leading-relaxed whitespace-pre-wrap">{currentStory.material}</p>
                    </div>
                  </div>
                )}

                {/* Skip story panel — only shown in step 1 */}
                {currentStep === "story" && !isStoryScored && !isStorySkipped && (
                  <div className="bg-white rounded-xl border shadow-sm">
                    {!skipStoryPanel ? (
                      <button onClick={function() { setSkipStoryPanel(true); }}
                        className="w-full px-4 py-3 text-xs text-gray-400 hover:text-gray-600 hover:bg-gray-50 rounded-xl transition-colors text-left"
                      >
                        Can’t score this story? Skip it →
                      </button>
                    ) : (
                      <div className="p-4 space-y-3">
                        <div className="text-xs font-semibold text-gray-600">Reason for skipping (optional)</div>
                        <textarea value={skipStoryReason} onChange={function(e) { setSkipStoryReason(e.target.value); }}
                          placeholder="e.g. story text not visible, language barrier..."
                          className="w-full border border-gray-200 rounded-lg p-2.5 text-xs h-16 resize-none focus:outline-none focus:ring-2 focus:ring-orange-200"
                        />
                        <div className="flex gap-2">
                          <button onClick={function() { setSkipStoryPanel(false); setSkipStoryReason(""); }}
                            className="flex-1 py-2 rounded-lg border border-gray-200 text-xs text-gray-500 hover:bg-gray-50"
                          >Cancel</button>
                          <button onClick={handleSkipStory}
                            className="flex-1 py-2 rounded-lg bg-orange-500 text-white text-xs font-semibold hover:bg-orange-600"
                          >Skip story</button>
                        </div>
                      </div>
                    )}
                  </div>
                )}
              </div>

              {/* ── Right column ── */}
              <div className="space-y-3">
                {currentStep === "story" ? (
                  <StoryRubricForm
                    key={currentStory ? currentStory.id + "_story" : "story"}
                    pair={currentStory}
                    existing={currentStory ? storyAnnotations[currentStory.id] : null}
                    onSubmit={handleStorySubmit}
                    onSkip={function() { setCurrentStep("questions"); setCurrentPairIdx(0); }}
                  />
                ) : (
                  <>
                    {/* Story score / skip banner */}
                    {isStoryScored && (
                      <div className="flex items-center gap-2 px-3 py-2 bg-blue-50 border border-blue-200 rounded-xl text-xs text-blue-700">
                        <span className="font-semibold">● Story scored</span>
                        <button onClick={function() { setCurrentStep("story"); }} className="ml-auto text-blue-500 hover:text-blue-700 underline">← Edit story scores</button>
                      </div>
                    )}
                    {isStorySkipped && (
                      <div className="flex items-center gap-2 px-3 py-2 bg-orange-50 border border-orange-200 rounded-xl text-xs text-orange-700">
                        <span className="font-semibold">⛔ Story skipped</span>
                        <button onClick={function() { setCurrentStep("story"); }} className="ml-auto text-orange-500 hover:text-orange-700 underline">← Score story</button>
                      </div>
                    )}

                    {/* Within-story pair navigation */}
                    {currentStory && currentStory.pairs.length > 1 && (
                      <div className="flex items-center gap-2 px-3 py-2 bg-white border rounded-xl">
                        <span className="text-xs text-gray-500 shrink-0">
                          Pair {currentPairIdx + 1} of {currentStory.pairs.length}
                        </span>
                        <div className="flex gap-1 items-center flex-1">
                          {currentStory.pairs.map(function(p, idx) {
                            var isDone = !!annotations[p.id];
                            var isCur  = idx === currentPairIdx;
                            return (
                              <button key={p.id} onClick={function() { setCurrentPairIdx(idx); }}
                                className={"rounded-full transition-all " + (isCur ? "w-5 h-2.5 bg-violet-600" : isDone ? "w-2.5 h-2.5 bg-green-400 hover:bg-green-500" : "w-2.5 h-2.5 bg-gray-300 hover:bg-gray-400")}
                              />
                            );
                          })}
                        </div>
                        <div className="flex gap-1 shrink-0">
                          <button onClick={function() { if (currentPairIdx > 0) setCurrentPairIdx(currentPairIdx - 1); }}
                            disabled={currentPairIdx === 0}
                            className="px-2 py-1 rounded text-xs text-gray-500 border border-gray-200 hover:bg-gray-50 disabled:opacity-40"
                          >←</button>
                          <button onClick={function() { if (currentPairIdx < currentStory.pairs.length - 1) setCurrentPairIdx(currentPairIdx + 1); }}
                            disabled={currentPairIdx === currentStory.pairs.length - 1}
                            className="px-2 py-1 rounded text-xs text-gray-500 border border-gray-200 hover:bg-gray-50 disabled:opacity-40"
                          >→</button>
                        </div>
                      </div>
                    )}

                    {currentPair && (
                      <PairForm
                        key={currentPair.id}
                        pair={currentPair}
                        existing={annotations[currentPair.id]}
                        isAnnotated={isAnnotated}
                        onSubmit={handleAnnotationSubmit}
                      />
                    )}
                  </>
                )}
              </div>

            </div>
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById("root"));
  </script>
</body>
</html>
