    function extractMetadata(row) {
      return {

          row.estimated_difficulty !== undefined && row.estimated_difficulty !== null
            ? row.estimated_difficulty : null,
        kind:         row.kind || null,
        model:        row.question_generating_model || null,
        ground_truth: row.ground_truth_answer || null,
        document_id:  row.document_id || null,
      };
    }

    // Split each document's rows in half by file order, pair positionally.
    // Agnostic to any specific field — works with any two generation batches.
    function buildPairs(rows) {
      var byDoc = {};
      rows.forEach(function(row, i) {
        var key = row.document_id || "default";
        if (!byDoc[key]) byDoc[key] = [];
        byDoc[key].push({ row: row, idx: i });
      });

      var pairs = [];
      Object.keys(byDoc).forEach(function(docId) {
        var entries = byDoc[docId];
        var half    = Math.floor(entries.length / 2);
        var groupA  = entries.slice(0, half);
        var groupB  = entries.slice(half, half * 2);
        for (var j = 0; j < groupA.length; j++) {
          var a = groupA[j];
          var b = groupB[j];
          pairs.push({
            id:        "pair_" + docId + "_" + j,
            material:  a.row.document || a.row.document_summary || "",
            questionA: a.row.question || "",
            questionB: b.row.question || "",
            metadataA: extractMetadata(a.row),
            metadataB: extractMetadata(b.row),
          });
        }
      });
      return pairs;
    }

    function totalScore(scores) {

      return (
        <div className="flex gap-1.5 shrink-0">

            return (

                onClick={function() { onChange(value === s ? null : s); }}
                className={"w-9 h-9 rounded-lg border-2 font-bold text-sm transition-all select-none " +

                title={"Score " + s}

                placeholder="e.g. 'Hard to judge whether a feelings question counts as critical to the plot...'"
                className="w-full border rounded-xl p-3 text-sm h-32 resize-none focus:outline-none focus:ring-2 focus:ring-violet-300 focus:border-violet-400"
                autoFocus
              />
            </div>
            <div className="px-6 py-4 border-t flex justify-end gap-3">
              <button onClick={onClose} className="px-4 py-2 text-sm text-gray-500 hover:text-gray-700">Cancel</button>
              <button
                disabled={!text.trim()}
                onClick={function() { if (text.trim()) onSubmit({ criterionId: criterionId, text: text }); }}
                className="px-5 py-2 text-sm bg-violet-600 text-white rounded-lg hover:bg-violet-700 disabled:opacity-40 disabled:cursor-not-allowed transition-colors"
              >Submit</button>
            </div>
          </div>
        </div>
      );
    }

    // ─── METADATA BADGES ─────────────────────────────────────────────────────────

    function MetadataBadges({ metadata }) {
      if (!metadata) return null;
      var catColor  = { literal: "bg-blue-100 text-blue-700", inferential: "bg-purple-100 text-purple-700", connection: "bg-teal-100 text-teal-700" };
      var diffColor = ["bg-green-100 text-green-700", "bg-amber-100 text-amber-700", "bg-red-100 text-red-700"];
      var diffLabel = ["easy", "medium", "hard"];
      var kindColor = { single_hop: "bg-sky-100 text-sky-700", multi_hop: "bg-indigo-100 text-indigo-700" };

      var badges = [];
      if (metadata.kind)
        badges.push(<span key="kind" className={"text-xs px-2 py-0.5 rounded-full font-semibold " + (kindColor[metadata.kind] || "bg-gray-100 text-gray-600")}>{metadata.kind.replace("_", " ")}</span>);
      if (metadata.question_category && metadata.question_category !== "unknown")
        badges.push(<span key="cat"  className={"text-xs px-2 py-0.5 rounded-full font-medium " + (catColor[metadata.question_category] || "bg-gray-100 text-gray-600")}>{metadata.question_category}</span>);
      if (metadata.estimated_difficulty !== null && metadata.estimated_difficulty !== undefined)
        badges.push(<span key="diff" className={"text-xs px-2 py-0.5 rounded-full font-medium " + (diffColor[metadata.estimated_difficulty] || "bg-gray-100 text-gray-600")}>{diffLabel[metadata.estimated_difficulty] || "diff " + metadata.estimated_difficulty}</span>);
      if (metadata.model)
        badges.push(<span key="model" className="text-xs px-2 py-0.5 rounded-full font-medium bg-orange-100 text-orange-700">{metadata.model}</span>);

      if (badges.length === 0) return null;
      return <div className="flex flex-wrap gap-1.5 mb-2">{badges}</div>;
    }

    // ─── GROUND TRUTH REVEAL ─────────────────────────────────────────────────────

    function GroundTruthReveal({ groundTruth }) {
      const [show, setShow] = useState(false);
      if (!groundTruth) return null;
      return (
        <div className="mt-2">
          <button
            onClick={function() { setShow(function(s) { return !s; }); }}
            className="text-xs text-gray-400 hover:text-gray-600 underline transition-colors"
          >{show ? "▲ Hide ground truth" : "▼ Show ground truth"}</button>
          {show && (
            <div className="mt-1.5 p-2.5 bg-yellow-50 border border-yellow-200 rounded-lg text-xs text-yellow-900 leading-relaxed">
              <span className="font-semibold text-yellow-800">Expected answer: </span>{groundTruth}
            </div>
          )}
        </div>
      );
    }

    // ─── QUESTION SCORE CARD ─────────────────────────────────────────────────────
    // Scores one question on all 3 dimensions. Used inside the pair form.

    function QuestionScoreCard({ label, question, scores, onScoreChange, accent, metadata, skipped, onSkipToggle }) {
      var borderCls = { blue: "border-blue-300 bg-blue-50", purple: "border-purple-300 bg-purple-50" };
      var labelCls  = { blue: "bg-blue-100 text-blue-700", purple: "bg-purple-100 text-purple-700" };
      var total = totalScore(scores);
      return (
        <div className={"border-2 rounded-xl p-4 flex flex-col gap-3 transition-all " + (skipped ? "border-red-300 bg-red-50 opacity-80" : borderCls[accent])}>
          {/* Header */}
          <div className="flex items-center justify-between">
            <span className={"text-xs font-bold px-2.5 py-1 rounded-full " + (skipped ? "bg-red-100 text-red-600" : labelCls[accent])}>{label}</span>
            <div className="flex items-center gap-2">
              {!skipped && total !== null && (
                <span className="text-xs font-semibold text-gray-500">
                  Score: <span className={"font-bold text-base " + (total >= 4 ? "text-green-600" : total >= 2 ? "text-amber-600" : "text-red-600")}>{total}</span>
                  <span className="text-gray-400">/6</span>
                </span>
              )}
              {/* Skip toggle */}
              <button
                onClick={onSkipToggle}
                title={skipped ? "Undo skip — annotate this question" : "Skip this question (too poor to annotate)"}
                className={"text-xs px-2.5 py-1 rounded-lg border font-medium transition-all " +
                  (skipped
                    ? "border-red-400 bg-red-100 text-red-700 hover:bg-red-200"
                    : "border-gray-200 text-gray-400 hover:border-red-300 hover:text-red-500 hover:bg-red-50")}
              >{skipped ? "⛔ Skipped — undo" : "⛔ Skip question"}</button>
            </div>
          </div>

          {/* Metadata */}
          {metadata && <MetadataBadges metadata={metadata} />}

          {/* Question text */}
          <div className={"text-sm p-3 rounded-xl border italic leading-relaxed " + (skipped ? "text-gray-400 bg-white line-through" : "text-gray-800 bg-white")}>
            "{question}"
          </div>

          {skipped ? (
            <div className="text-xs text-red-500 text-center py-2 font-medium">
              ⛔ Question skipped — not scored
            </div>
          ) : (
            <>
              {/* Ground truth */}
              {metadata && <GroundTruthReveal groundTruth={metadata.ground_truth} />}

              {/* Dimension scores */}
              <div className="space-y-2.5 pt-1">
                {CRITERIA.map(function(c) {
                  return (
                    <div key={c.id} className="flex items-center justify-between gap-2">
                      <span className="text-xs font-medium text-gray-600 shrink-0">{c.icon} {c.name}</span>
                      <ScoreSelector
                        value={scores[c.id]}
                        onChange={function(val) { onScoreChange(c.id, val); }}
                      />
                    </div>
                  );
                })}
              </div>
            </>
          )}
        </div>
      );
    }

    // ─── PAIR ANNOTATION FORM ────────────────────────────────────────────────────
    // The combined form: score both questions + pick overall winner + add reasoning.

    function PairForm({ pair, onSubmit, existing }) {
      const [scoresA, setScoresA] = useState(existing ? existing.scoresA : emptyScores());
      const [scoresB, setScoresB] = useState(existing ? existing.scoresB : emptyScores());
      const [winner,  setWinner]  = useState(existing ? existing.winner  : null);
      const [reason,  setReason]  = useState(existing ? existing.reason  : "");
      const [skipA,   setSkipA]   = useState(existing ? !!existing.questionASkipped : false);
      const [skipB,   setSkipB]   = useState(existing ? !!existing.questionBSkipped : false);

      // A question is "ready" if it's skipped OR fully scored
      var readyA = skipA || allFilled(scoresA);
      var readyB = skipB || allFilled(scoresB);

      // Auto-derive winner when exactly one question is skipped
      var effectiveWinner = winner;
      if (skipA && skipB) effectiveWinner = "both-skipped";
      else if (skipA)     effectiveWinner = effectiveWinner || "B";
      else if (skipB)     effectiveWinner = effectiveWinner || "A";

      var canSubmit = readyA && readyB && (effectiveWinner !== null);

      // Winner options — hide forced choices when a skip constrains them
      var WINNER_OPTS = skipA && skipB ? [] : [
        !skipA && !skipB ? { value: "A",   label: "A is better",   cls: "border-blue-400 bg-blue-50 text-blue-700 font-semibold" }   : null,
        !skipA && !skipB ? { value: "tie", label: "Roughly equal", cls: "border-gray-400 bg-gray-100 text-gray-700 font-semibold" } : null,
        !skipA && !skipB ? { value: "B",   label: "B is better",   cls: "border-purple-400 bg-purple-50 text-purple-700 font-semibold" } : null,
        skipA  ? { value: "B", label: "B is better (A skipped)", cls: "border-purple-400 bg-purple-50 text-purple-700 font-semibold" } : null,
        skipB  ? { value: "A", label: "A is better (B skipped)", cls: "border-blue-400 bg-blue-50 text-blue-700 font-semibold" }    : null,
      ].filter(Boolean);

      return (
        <div className="space-y-4">
          {/* Two question cards side by side */}
          <div className="grid grid-cols-1 xl:grid-cols-2 gap-4">
            <QuestionScoreCard
              label="Question A"
              question={pair.questionA}
              scores={scoresA}
              onScoreChange={function(dim, val) { setScoresA(function(p) { var n = Object.assign({}, p); n[dim] = val; return n; }); }}
              accent="blue"
              metadata={pair.metadataA}
              skipped={skipA}
              onSkipToggle={function() {
                setSkipA(function(s) { return !s; });
                // Clear forced winner if un-skipping
                if (skipA) setWinner(null);
              }}
            />
            <QuestionScoreCard
              label="Question B"
              question={pair.questionB}
              scores={scoresB}
              onScoreChange={function(dim, val) { setScoresB(function(p) { var n = Object.assign({}, p); n[dim] = val; return n; }); }}
              accent="purple"
              metadata={pair.metadataB}
              skipped={skipB}
              onSkipToggle={function() {
                setSkipB(function(s) { return !s; });
                if (skipB) setWinner(null);
              }}
            />
          </div>

          {/* Both-skipped notice */}
          {skipA && skipB && (
            <div className="bg-red-50 border border-red-200 rounded-xl p-3 text-sm text-red-700 text-center font-medium">
              ⛔ Both questions skipped — this pair will be marked as unannotatable and skipped.
            </div>
          )}

          {/* Overall preference (hidden if both skipped) */}
          {!(skipA && skipB) && (
            <div className="bg-white border rounded-xl p-4 shadow-sm">
              <div className="text-sm font-semibold text-gray-700 mb-3">
                Overall Preference
                {(skipA || skipB) && <span className="ml-2 text-xs font-normal text-red-500">(auto-set due to skipped question)</span>}
              </div>
              <div className="flex flex-col sm:flex-row gap-2">
                {WINNER_OPTS.map(function(opt) {
                  var isActive = winner === opt.value || (skipA && opt.value === "B") || (skipB && opt.value === "A");
                  return (
                    <button
                      key={opt.value}
                      onClick={function() { if (!skipA && !skipB) setWinner(opt.value); }}
                      disabled={skipA || skipB}
                      className={"flex-1 py-2.5 px-3 rounded-xl border-2 text-sm transition-all " +
                        (isActive ? opt.cls : "border-gray-200 text-gray-500 hover:border-gray-300 bg-white") +
                        (skipA || skipB ? " cursor-default" : "")}
                    >{opt.label}</button>
                  );
                })}
              </div>
            </div>
          )}

          {/* Reasoning */}
          <div className="bg-white border rounded-xl p-4 shadow-sm">
            <label className="text-sm font-semibold text-gray-700 block mb-1.5">
              Reasoning <span className="font-normal text-gray-400">(optional but encouraged)</span>
            </label>
            <textarea
              value={reason}
              onChange={function(e) { setReason(e.target.value); }}
              placeholder="Why did you prefer one over the other? Note observations about vocabulary, sentence complexity, or how well the question targets key ideas..."
              className="w-full border rounded-xl p-3 text-sm h-24 resize-none focus:outline-none focus:ring-2 focus:ring-violet-300 focus:border-violet-400"
            />
          </div>

          <button
            onClick={function() {
              if (canSubmit) onSubmit({
                pairId:           pair.id,
                scoresA:          skipA ? null : scoresA,
                scoresB:          skipB ? null : scoresB,
                winner:           skipA && skipB ? "both-skipped" : (skipA ? "B" : skipB ? "A" : winner),
                reason:           reason,
                questionASkipped: skipA,
                questionBSkipped: skipB,
              });
            }}
            disabled={!canSubmit}
            className="w-full py-3.5 rounded-xl font-semibold text-sm transition-all bg-violet-600 text-white hover:bg-violet-700 active:bg-violet-800 disabled:opacity-40 disabled:cursor-not-allowed"
          >
            {canSubmit
              ? (existing ? "Update & Continue →" : "Save & Continue →")
              : "Score both questions (or skip them) and pick a preference to continue"}
          </button>
        </div>
      );
    }

    // ─── DONE SCREEN ─────────────────────────────────────────────────────────────

    function DoneScreen({ pairs, annotations, rubricFeedback, skippedStories, onBack }) {
      function buildExport() {
        // Pairwise section: preference + reasoning
        var pairwiseAnnotations = Object.values(annotations).map(function(ann) {
          var pair = pairs.find(function(p) { return p.id === ann.pairId; });
          return {
            pairId:           ann.pairId,
            material:         pair ? pair.material  : null,
            questionA:        pair ? pair.questionA : null,
            questionB:        pair ? pair.questionB : null,
            metadataA:        pair ? pair.metadataA : null,
            metadataB:        pair ? pair.metadataB : null,
            winner:           ann.winner,
            reason:           ann.reason,
            questionASkipped: !!ann.questionASkipped,
            questionBSkipped: !!ann.questionBSkipped,
            timestamp:        ann.timestamp,
          };
        });

        // Score section: one entry per question (A and B separately), skipped questions noted
        var scoreAnnotations = [];
        Object.values(annotations).forEach(function(ann) {
          var pair = pairs.find(function(p) { return p.id === ann.pairId; });
          scoreAnnotations.push({
            questionId: ann.pairId + "_A",
            pairId:     ann.pairId,
            question:   pair ? pair.questionA : null,
            metadata:   pair ? pair.metadataA : null,
            skipped:    !!ann.questionASkipped,
            scores:     ann.questionASkipped ? null : ann.scoresA,
            totalScore: ann.questionASkipped ? null : totalScore(ann.scoresA),
            timestamp:  ann.timestamp,
          });
          scoreAnnotations.push({
            questionId: ann.pairId + "_B",
            pairId:     ann.pairId,
            question:   pair ? pair.questionB : null,
            metadata:   pair ? pair.metadataB : null,
            skipped:    !!ann.questionBSkipped,
            scores:     ann.questionBSkipped ? null : ann.scoresB,
            totalScore: ann.questionBSkipped ? null : totalScore(ann.scoresB),
            timestamp:  ann.timestamp,
          });
        });

        var skippedStoriesArr = Object.values(skippedStories);

        return {
          exportDate:           new Date().toISOString(),
          summary: {
            pairsAnnotated:       pairwiseAnnotations.length,
            questionsScored:      scoreAnnotations.filter(function(q) { return !q.skipped; }).length,
            questionsSkipped:     scoreAnnotations.filter(function(q) { return q.skipped; }).length,
            storiesSkipped:       skippedStoriesArr.length,
            rubricFeedbackItems:  rubricFeedback.length,
          },
          pairwiseAnnotations:  pairwiseAnnotations,
          scoreAnnotations:     scoreAnnotations,
          skippedStories:       skippedStoriesArr,
          rubricFeedback:       rubricFeedback,
        };
      }

      function handleExport() {
        downloadJSON(buildExport(), "annotations_" + new Date().toISOString().slice(0, 10) + ".json");
      }

      var count        = Object.keys(annotations).length;
      var skipCount    = Object.keys(skippedStories).length;
      var skippedQs    = Object.values(annotations).filter(function(a) { return a.questionASkipped || a.questionBSkipped; }).length;
      return (
        <div className="min-h-screen bg-gradient-to-br from-violet-50 via-white to-indigo-50 flex items-center justify-center p-6">
          <div className="bg-white rounded-2xl shadow-xl p-8 max-w-lg w-full text-center">
            <div className="text-5xl mb-3">🎉</div>
            <h2 className="text-2xl font-bold text-gray-900 mb-1">All Done!</h2>
            <p className="text-gray-500 text-sm mb-8">All {pairs.length} pairs have been reviewed.</p>

            <div className="grid grid-cols-2 gap-3 mb-3">
              <div className="bg-blue-50 text-blue-700 rounded-xl p-4">
                <div className="text-3xl font-bold">{count}</div>
                <div className="text-xs mt-0.5 opacity-80">Pairs annotated</div>
              </div>
              <div className="bg-green-50 text-green-700 rounded-xl p-4">
                <div className="text-3xl font-bold">{count * 2 - skippedQs}</div>
                <div className="text-xs mt-0.5 opacity-80">Questions scored</div>
              </div>
            </div>
            <div className="grid grid-cols-2 gap-3 mb-8">
              <div className="bg-orange-50 text-orange-700 rounded-xl p-4">
                <div className="text-3xl font-bold">{skipCount}</div>
                <div className="text-xs mt-0.5 opacity-80">Stories skipped</div>
              </div>
              <div className="bg-amber-50 text-amber-700 rounded-xl p-4">
                <div className="text-3xl font-bold">{rubricFeedback.length}</div>
                <div className="text-xs mt-0.5 opacity-80">Rubric notes</div>
              </div>
            </div>

            <div className="mb-4 p-3 bg-gray-50 rounded-xl text-xs text-gray-500 text-left leading-relaxed">
              The exported JSON contains:<br />
              <span className="font-semibold text-gray-700">pairwiseAnnotations</span> — winner + reasoning per pair<br />
              <span className="font-semibold text-gray-700">scoreAnnotations</span> — dimensional scores (skipped questions flagged)<br />
              <span className="font-semibold text-gray-700">skippedStories</span> — stories marked as poor quality with optional reasons
            </div>

            <div className="space-y-3">
              <button onClick={handleExport} className="w-full py-4 bg-violet-600 text-white rounded-xl font-semibold hover:bg-violet-700 transition-colors">
                ⬇ Download Annotations (JSON)
              </button>
              <button onClick={onBack} className="w-full py-3 border border-gray-200 text-gray-600 rounded-xl text-sm hover:bg-gray-50 transition-colors">
                ← Review / Edit Previous Annotations
              </button>
            </div>
            <p className="text-xs text-gray-400 mt-4">Please send the downloaded JSON file to the research team.</p>
          </div>
        </div>
      );
    }

    // ─── MAIN APP ────────────────────────────────────────────────────────────────

    function App() {
      // Build pairs once on mount from the embedded batch
      const [pairs]                             = useState(function() { return buildPairs(BATCH); });
      const [done, setDone]                     = useState(false);
      const [currentIndex, setCurrentIndex]     = useState(0);
      const [annotations, setAnnotations]       = useState({});   // { pairId: annotation }
      const [rubricFeedback, setRubricFeedback] = useState([]);
      const [flagModal, setFlagModal]           = useState(null);
      const [skippedStories, setSkippedStories] = useState({});   // { pairId: { reason, timestamp } }
      const [skipStoryPanel, setSkipStoryPanel] = useState(false);
      const [skipStoryReason, setSkipStoryReason] = useState("");

      var currentPair    = pairs[currentIndex];
      // completedCount includes both annotated pairs AND skipped stories
      var completedCount = Object.keys(annotations).length + Object.keys(skippedStories).length;
      var progress       = pairs.length ? completedCount / pairs.length : 0;

      function advanceToNext(completedIds) {
        var nextIdx = -1;
        for (var i = currentIndex + 1; i < pairs.length; i++) {
          if (!completedIds.has(pairs[i].id)) { nextIdx = i; break; }
        }
        if (nextIdx === -1) {
          for (var j = 0; j < pairs.length; j++) {
            if (!completedIds.has(pairs[j].id)) { nextIdx = j; break; }
          }
        }
        if (nextIdx !== -1) setCurrentIndex(nextIdx);
        else setDone(true);
      }

      function handleSubmit(ann) {
        var enriched = Object.assign({}, ann, { timestamp: new Date().toISOString() });
        var updated  = Object.assign({}, annotations);
        updated[ann.pairId] = enriched;
        setAnnotations(updated);

        var completedIds = new Set([...Object.keys(updated), ...Object.keys(skippedStories)]);
        if (completedIds.size >= pairs.length) { setDone(true); return; }
        advanceToNext(completedIds);
      }

      function handleSkipStory() {
        var reason = skipStoryReason.trim();
        var updated = Object.assign({}, skippedStories);
        updated[currentPair.id] = {
          pairId:    currentPair.id,
          material:  currentPair.material,
          reason:    reason,
          timestamp: new Date().toISOString(),
        };
        setSkippedStories(updated);
        setSkipStoryPanel(false);
        setSkipStoryReason("");

        var completedIds = new Set([...Object.keys(annotations), ...Object.keys(updated)]);
        if (completedIds.size >= pairs.length) { setDone(true); return; }
        advanceToNext(completedIds);
      }

      function handleFlagSubmit(payload) {
        var criterion = CRITERIA.find(function(c) { return c.id === payload.criterionId; });
        setRubricFeedback(function(prev) {
          return prev.concat([{
            id:            "rf_" + Date.now(),
            criterionId:   payload.criterionId,
            criterionName: criterion ? criterion.name : payload.criterionId,
            text:          payload.text,
            relatedPairId: currentPair ? currentPair.id : null,
            timestamp:     new Date().toISOString(),
          }]);
        });
        setFlagModal(null);
      }

      function handleExportMidway() {
        // Same structure as done-screen export, with in-progress status
        var annArr = Object.values(annotations);
        var scoreAnnotations = [];
        annArr.forEach(function(ann) {
          var pair = pairs.find(function(p) { return p.id === ann.pairId; });
          scoreAnnotations.push({ questionId: ann.pairId + "_A", pairId: ann.pairId, question: pair ? pair.questionA : null, metadata: pair ? pair.metadataA : null, skipped: !!ann.questionASkipped, scores: ann.questionASkipped ? null : ann.scoresA, totalScore: ann.questionASkipped ? null : totalScore(ann.scoresA), timestamp: ann.timestamp });
          scoreAnnotations.push({ questionId: ann.pairId + "_B", pairId: ann.pairId, question: pair ? pair.questionB : null, metadata: pair ? pair.metadataB : null, skipped: !!ann.questionBSkipped, scores: ann.questionBSkipped ? null : ann.scoresB, totalScore: ann.questionBSkipped ? null : totalScore(ann.scoresB), timestamp: ann.timestamp });
        });
        downloadJSON({
          exportDate: new Date().toISOString(),
          status: "in-progress",
          summary: { pairsAnnotated: annArr.length, totalPairs: pairs.length, questionsScored: scoreAnnotations.filter(function(q){return !q.skipped;}).length, storiesSkipped: Object.keys(skippedStories).length, rubricFeedbackItems: rubricFeedback.length },
          pairwiseAnnotations: annArr.map(function(ann) {
            var pair = pairs.find(function(p) { return p.id === ann.pairId; });
            return { pairId: ann.pairId, material: pair ? pair.material : null, questionA: pair ? pair.questionA : null, questionB: pair ? pair.questionB : null, metadataA: pair ? pair.metadataA : null, metadataB: pair ? pair.metadataB : null, winner: ann.winner, reason: ann.reason, questionASkipped: !!ann.questionASkipped, questionBSkipped: !!ann.questionBSkipped, timestamp: ann.timestamp };
          }),
          scoreAnnotations: scoreAnnotations,
          skippedStories: Object.values(skippedStories),
          rubricFeedback: rubricFeedback,
        }, "annotations_partial_" + new Date().toISOString().slice(0, 10) + ".json");
      }

      if (done) {
        return (
          <DoneScreen
            pairs={pairs}
            annotations={annotations}
            rubricFeedback={rubricFeedback}
            skippedStories={skippedStories}
            onBack={function() { setDone(false); setCurrentIndex(pairs.length - 1); }}
          />
        );
      }

      var isAnnotated = !!(currentPair && annotations[currentPair.id]);

      return (
        <div className="min-h-screen bg-gray-100 flex flex-col">

          {/* ── HEADER ── */}
          <header className="bg-white border-b shadow-sm sticky top-0 z-20">
            <div className="max-w-screen-xl mx-auto px-4 py-3 flex items-center gap-3">
              <span className="font-bold text-violet-700 text-sm shrink-0">📝 Annotator</span>
              <span className="text-xs text-gray-500 shrink-0">
                {currentIndex + 1} / {pairs.length}
                <span className="text-gray-400 ml-1">({completedCount} saved)</span>
              </span>
              <div className="flex-1 flex items-center gap-2 min-w-0">
                <div className="flex-1 bg-gray-200 rounded-full h-1.5">
                  <div className="bg-violet-500 h-1.5 rounded-full transition-all duration-500" style={{ width: (progress * 100) + "%" }} />
                </div>
                <span className="text-xs text-gray-400 shrink-0">{Math.round(progress * 100)}%</span>
              </div>
              <div className="flex gap-1 shrink-0">
                <button
                  onClick={function() { setCurrentIndex(function(i) { return Math.max(0, i - 1); }); }}
                  disabled={currentIndex === 0}
                  className="px-2.5 py-1.5 border rounded-lg text-xs disabled:opacity-30 hover:bg-gray-50 transition-colors"
                >←</button>
                <button
                  onClick={function() { setCurrentIndex(function(i) { return Math.min(pairs.length - 1, i + 1); }); }}
                  disabled={currentIndex === pairs.length - 1}
                  className="px-2.5 py-1.5 border rounded-lg text-xs disabled:opacity-30 hover:bg-gray-50 transition-colors"
                >→</button>
              </div>
              <button
                onClick={handleExportMidway}
                className="shrink-0 px-3 py-1.5 border border-violet-200 bg-violet-50 text-violet-700 rounded-lg text-xs font-medium hover:bg-violet-100 transition-colors"
              >⬇ Export</button>
            </div>

            {/* Progress dots */}
            <div className="max-w-screen-xl mx-auto px-4 pb-2 flex gap-1.5 overflow-x-auto">
              {pairs.map(function(pair, idx) {
                var isSkipped = !!skippedStories[pair.id];
                var cls = idx === currentIndex ? "w-6 h-3 bg-violet-600"
                        : isSkipped            ? "w-3 h-3 bg-orange-400 hover:bg-orange-500"
                        : annotations[pair.id] ? "w-3 h-3 bg-green-400 hover:bg-green-500"
                                               : "w-3 h-3 bg-gray-300 hover:bg-gray-400";
                return (
                  <button
                    key={pair.id}
                    onClick={function() { setCurrentIndex(idx); }}
                    title={"Pair " + (idx + 1) + (annotations[pair.id] ? " ✓" : isSkipped ? " ⛔ story skipped" : "")}
                    className={"shrink-0 rounded-full transition-all duration-200 " + cls}
                  />
                );
              })}
            </div>
          </header>

          {/* ── MAIN ── */}
          <main className="flex-1 max-w-screen-xl mx-auto w-full px-4 py-6">
            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">

              {/* Left: source text + rubric */}
              <div className="space-y-4">
                <div className={"bg-white border rounded-xl p-4 shadow-sm " + (currentPair && skippedStories[currentPair.id] ? "border-orange-300 bg-orange-50" : "")}>
                  <div className="flex items-center justify-between mb-2">
                    <div className="text-xs font-semibold text-gray-400 uppercase tracking-wider">📖 Source Material</div>
                    {currentPair && skippedStories[currentPair.id] ? (
                      <span className="text-xs font-semibold text-orange-600 bg-orange-100 px-2 py-0.5 rounded-full">⛔ Story Skipped</span>
                    ) : (
                      <button
                        onClick={function() { setSkipStoryPanel(function(s) { return !s; }); setSkipStoryReason(""); }}
                        className="text-xs text-gray-400 hover:text-red-500 border border-gray-200 hover:border-red-300 hover:bg-red-50 px-2.5 py-1 rounded-lg transition-all font-medium"
                      >⛔ Skip story</button>
                    )}
                  </div>
                  <p className={"text-sm leading-relaxed whitespace-pre-line " + (currentPair && skippedStories[currentPair.id] ? "text-gray-400 line-through" : "text-gray-700")}>
                    {currentPair && currentPair.material}
                  </p>

                  {/* Skip story inline panel */}
                  {skipStoryPanel && currentPair && !skippedStories[currentPair.id] && (
                    <div className="mt-3 pt-3 border-t border-red-200">
                      <p className="text-xs text-red-600 font-semibold mb-1.5">⛔ Skip this story?</p>
                      <p className="text-xs text-gray-500 mb-2">This will mark the story as poor quality and move to the next pair.</p>
                      <textarea
                        value={skipStoryReason}
                        onChange={function(e) { setSkipStoryReason(e.target.value); }}
                        placeholder="Optional: brief reason (e.g. 'story is too short', 'unrelated to grade level')"
                        className="w-full border border-red-200 rounded-lg p-2 text-xs h-16 resize-none focus:outline-none focus:ring-2 focus:ring-red-200 mb-2"
                      />
                      <div className="flex gap-2">
                        <button
                          onClick={handleSkipStory}
                          className="flex-1 py-2 bg-red-500 text-white rounded-lg text-xs font-semibold hover:bg-red-600 transition-colors"
                        >⛔ Confirm Skip</button>
                        <button
                          onClick={function() { setSkipStoryPanel(false); setSkipStoryReason(""); }}
                          className="flex-1 py-2 border border-gray-200 text-gray-500 rounded-lg text-xs hover:bg-gray-50 transition-colors"
                        >Cancel</button>
                      </div>
                    </div>
                  )}

                  {/* Show skip reason if already skipped */}
                  {currentPair && skippedStories[currentPair.id] && (
                    <div className="mt-3 pt-3 border-t border-orange-200">
                      <p className="text-xs text-orange-600 font-medium">
                        Skipped{skippedStories[currentPair.id].reason ? ": " + skippedStories[currentPair.id].reason : " (no reason provided)"}
                      </p>
                      <button
                        onClick={function() {
                          var updated = Object.assign({}, skippedStories);
                          delete updated[currentPair.id];
                          setSkippedStories(updated);
                        }}
                        className="mt-1.5 text-xs text-orange-500 underline hover:text-orange-700"
                      >Undo skip</button>
                    </div>
                  )}
                </div>
                <RubricPanel onFlag={function(cId) { setFlagModal({ criterionId: cId }); }} />
              </div>

              {/* Right: annotation form */}
              <div className="lg:col-span-2 space-y-3">
                {isAnnotated && (
                  <div className="flex items-center gap-2 text-xs text-green-700 bg-green-50 border border-green-200 rounded-xl px-4 py-2.5">
                    <span className="text-base">✅</span>
                    <span><span className="font-semibold">Already annotated.</span> You can update your response below.</span>
                  </div>
                )}
                <PairForm
                  key={currentPair ? currentPair.id : "pair"}
                  pair={currentPair}
                  onSubmit={handleSubmit}
                  existing={currentPair ? annotations[currentPair.id] : null}
                />
              </div>
            </div>
          </main>

          {flagModal && (
            <FlagModal
              criterionId={flagModal.criterionId}
              onClose={function() { setFlagModal(null); }}
              onSubmit={handleFlagSubmit}
            />
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
